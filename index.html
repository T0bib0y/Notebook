<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook • Ad-free Text Editor</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#18181b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Clean private Markdown notebook with folders, tags, drag & drop, and import/export.">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; letter-spacing: -0.02em; }
        .note-item { transition: all 0.1s ease; }
        .note-item:hover { background-color: #27272a; }
        .note-item.active { background-color: #3f3f46; border-left: 3px solid #a1a1aa; }
        .note-item[draggable="true"] { cursor: grab; }
        .folder-item.drop-target { background-color: #3f3f46; }
        .tag-pill { font-size: 10px; padding: 1px 7px; background: #27272a; border-radius: 9999px; }
        .folder-badge { font-size: 10px; padding: 0 6px; border-radius: 999px; background: #27272a; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-4 border-b border-zinc-800 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-white rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-book text-zinc-900 text-2xl"></i>
                    </div>
                    <span class="logo-font text-2xl font-semibold tracking-tighter">Notebook</span>
                </div>
                <button onclick="createNewNote()" class="px-3 py-1.5 text-sm font-medium bg-white text-zinc-900 rounded-xl flex items-center gap-x-2 hover:bg-zinc-100">
                    <i class="fa-solid fa-plus text-xs"></i>
                    <span class="font-semibold">New</span>
                </button>
            </div>

            <!-- Search -->
            <div class="px-3 pt-3 pb-2">
                <div class="relative">
                    <input id="search-input" type="text" placeholder="Search notes, tags..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl pl-9 py-2 text-sm outline-none focus:border-zinc-500">
                    <i class="fa-solid fa-search absolute left-3.5 top-2.5 text-zinc-500"></i>
                </div>
            </div>

            <!-- Folders -->
            <div class="px-3 pt-2">
                <div class="flex items-center justify-between px-2 mb-1">
                    <div class="text-xs font-semibold text-zinc-500 flex items-center gap-x-2">
                        <i class="fa-solid fa-folder"></i> <span>FOLDERS</span>
                    </div>
                    <button onclick="createNewFolder()" class="text-emerald-400 hover:text-emerald-300 text-xs flex items-center gap-x-1">
                        <i class="fa-solid fa-plus"></i> <span class="font-medium">New</span>
                    </button>
                </div>
                <div id="folder-list" class="space-y-0.5 text-sm"></div>
            </div>

            <!-- Notes -->
            <div class="flex-1 overflow-y-auto px-2 pt-3 border-t border-zinc-800 mt-2" id="notes-list"></div>

            <div class="p-4 border-t border-zinc-800 text-xs text-zinc-500">
                <div>Private • Works offline</div>
            </div>
        </div>

        <!-- Main Editor -->
        <div class="flex-1 flex flex-col">
            <!-- Top Bar -->
            <div class="h-14 border-b border-zinc-800 bg-zinc-900 px-5 flex items-center justify-between">
                <div class="flex items-center gap-x-3 flex-1 min-w-0">
                    <input id="note-title" type="text" placeholder="Untitled note" 
                           class="bg-transparent text-xl font-semibold flex-1 outline-none" onblur="updateCurrentNote()">
                    
                    <select id="note-folder" onchange="updateCurrentNote()" class="bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-1.5 text-sm">
                        <option value="">No folder</option>
                    </select>
                </div>

                <div class="flex items-center gap-x-2">
                    <div id="word-count" class="hidden md:block px-3 py-1 text-xs bg-zinc-800 rounded-full font-mono text-zinc-400">0 words</div>
                    
                    <button onclick="toggleTheme()" class="w-9 h-9 flex items-center justify-center text-zinc-400 hover:bg-zinc-800 rounded-xl">
                        <i id="theme-icon" class="fa-solid fa-moon"></i>
                    </button>

                    <!-- Export / Import -->
                    <div class="relative group">
                        <button class="px-4 py-2 text-sm bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-x-2">
                            <i class="fa-solid fa-download"></i> <span>Export</span>
                        </button>
                        <div class="absolute right-0 mt-2 w-56 bg-zinc-900 border border-zinc-700 rounded-2xl py-1 hidden group-hover:block z-50 shadow-xl">
                            <button onclick="exportNote('md')" class="w-full text-left px-4 py-2 text-sm hover:bg-zinc-800 flex items-center gap-x-3">
                                <i class="fa-brands fa-markdown"></i> Current as Markdown
                            </button>
                            <button onclick="exportNote('txt')" class="w-full text-left px-4 py-2 text-sm hover:bg-zinc-800 flex items-center gap-x-3">
                                <i class="fa-solid fa-file-lines"></i> Current as Text
                            </button>
                            <div class="border-t border-zinc-700 my-1"></div>
                            <button onclick="exportAllNotes()" class="w-full text-left px-4 py-2 text-sm hover:bg-zinc-800 flex items-center gap-x-3 text-emerald-400">
                                <i class="fa-solid fa-file-export"></i> <strong>Export All (JSON)</strong>
                            </button>
                            <button onclick="importNotes()" class="w-full text-left px-4 py-2 text-sm hover:bg-zinc-800 flex items-center gap-x-3 text-blue-400">
                                <i class="fa-solid fa-file-import"></i> <strong>Import from JSON</strong>
                            </button>
                        </div>
                    </div>

                    <button onclick="deleteCurrentNote()" class="w-9 h-9 flex items-center justify-center text-zinc-400 hover:text-red-400 hover:bg-zinc-800 rounded-xl">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </div>

            <!-- Tags -->
            <div class="px-5 py-2 border-b border-zinc-800 bg-zinc-900/60 flex items-center gap-x-3">
                <span class="text-xs text-zinc-400 w-12">TAGS</span>
                <input id="note-tags" type="text" placeholder="tag1, tag2, tag3" class="flex-1 bg-transparent text-sm outline-none" onblur="updateCurrentNote()">
                <div id="current-tags" class="flex gap-x-1 flex-wrap"></div>
            </div>

            <!-- Editor Area -->
            <div class="flex-1 flex overflow-hidden">
                <div class="flex-1 flex flex-col border-r border-zinc-800">
                    <div class="px-5 py-2 text-sm flex items-center border-b border-zinc-800 bg-zinc-900/40">
                        <span class="text-emerald-400 font-semibold flex items-center gap-x-2"><i class="fa-solid fa-edit"></i> Editor</span>
                    </div>
                    <textarea id="editor" class="flex-1 p-5 bg-zinc-950 resize-none outline-none text-[15px] leading-relaxed" placeholder="Write in Markdown..."></textarea>
                </div>

                <div class="flex-1 flex flex-col hidden lg:flex">
                    <div class="px-5 py-2 text-sm flex items-center border-b border-zinc-800 bg-zinc-900/40">
                        <span class="text-violet-400 font-semibold flex items-center gap-x-2"><i class="fa-solid fa-eye"></i> Preview</span>
                    </div>
                    <div id="preview" class="flex-1 p-5 overflow-auto prose prose-invert max-w-none"></div>
                </div>
            </div>

            <div class="h-9 border-t border-zinc-800 bg-zinc-900 px-5 flex items-center text-xs text-zinc-500">
                <div class="flex items-center gap-x-2">
                    <i class="fa-solid fa-shield-halved text-emerald-500"></i>
                    <span>Ad-free • Private • PWA</span>
                </div>
                <div id="save-status" class="ml-auto font-mono text-emerald-400">Saved locally</div>
            </div>
        </div>
    </div>

    <script>
        let notes = [];
        let currentNoteId = null;
        let saveTimeout = null;
        let currentFilter = '';
        let currentFolderFilter = '';
        let customFolders = [];

        function loadData() {
            const savedNotes = localStorage.getItem('notebook_notes');
            if (savedNotes) notes = JSON.parse(savedNotes);

            const savedFolders = localStorage.getItem('notebook_custom_folders');
            if (savedFolders) customFolders = JSON.parse(savedFolders);

            if (notes.length === 0) {
                notes.push({
                    id: Date.now().toString(36),
                    title: "Welcome to Notebook",
                    content: "# Welcome!\n\nThis version includes **custom folders**, **drag & drop**, and **import/export**.\n\n- Create custom folders using the + New button\n- Drag notes onto folders to move them\n- Use Import from the Export menu to restore backups",
                    folder: "Ideas",
                    tags: ["welcome"],
                    updated: new Date().toISOString()
                });
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('notebook_notes', JSON.stringify(notes));
            localStorage.setItem('notebook_custom_folders', JSON.stringify(customFolders));
        }

        function getAllFolders() {
            const foldersFromNotes = [...new Set(notes.map(n => n.folder).filter(Boolean))];
            return [...new Set([...customFolders, ...foldersFromNotes])];
        }

        function renderFolders() {
            const container = document.getElementById('folder-list');
            container.innerHTML = '';

            // All Notes
            const all = createFolderElement('All Notes', '', true);
            container.appendChild(all);

            getAllFolders().forEach(folder => {
                const el = createFolderElement(folder, folder);
                container.appendChild(el);
            });
        }

        function createFolderElement(name, folderValue, isAll = false) {
            const div = document.createElement('div');
            div.className = `folder-item px-3 py-1.5 rounded-xl flex items-center justify-between text-sm cursor-pointer hover:bg-zinc-800 ${currentFolderFilter === folderValue ? 'bg-zinc-800 text-white' : 'text-zinc-300'}`;
            
            const count = isAll ? notes.length : notes.filter(n => n.folder === folderValue).length;
            
            div.innerHTML = `
                <div class="flex items-center gap-x-2">
                    <i class="fa-solid fa-folder text-emerald-400"></i>
                    <span>${name}</span>
                </div>
                <span class="text-xs text-zinc-500">${count}</span>
            `;

            // Click to filter
            div.onclick = () => {
                currentFolderFilter = folderValue;
                renderNotesList();
                renderFolders();
            };

            // Drag & Drop support
            if (!isAll) {
                div.ondragover = e => { e.preventDefault(); div.classList.add('drop-target'); };
                div.ondragleave = () => div.classList.remove('drop-target');
                div.ondrop = e => {
                    e.preventDefault();
                    div.classList.remove('drop-target');
                    const noteId = e.dataTransfer.getData('text/plain');
                    moveNoteToFolder(noteId, folderValue);
                };
            }

            return div;
        }

        function renderNotesList() {
            const container = document.getElementById('notes-list');
            container.innerHTML = '';

            let filtered = notes;

            if (currentFolderFilter) filtered = filtered.filter(n => n.folder === currentFolderFilter);
            if (currentFilter) {
                const q = currentFilter.toLowerCase();
                filtered = filtered.filter(n => 
                    (n.title || '').toLowerCase().includes(q) ||
                    (n.content || '').toLowerCase().includes(q) ||
                    (n.tags || []).some(t => t.toLowerCase().includes(q))
                );
            }

            filtered.sort((a,b) => new Date(b.updated) - new Date(a.updated));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-4 text-center text-zinc-500 text-sm">No notes found</div>`;
                return;
            }

            filtered.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-item px-3 py-3 mx-1 my-0.5 rounded-2xl cursor-pointer ${note.id === currentNoteId ? 'active' : ''}`;
                div.draggable = true;

                const tagsHTML = (note.tags || []).slice(0,2).map(t => `<span class="tag-pill">${t}</span>`).join('');
                const folderHTML = note.folder ? `<span class="folder-badge text-xs">${note.folder}</span>` : '';

                div.innerHTML = `
                    <div class="px-1">
                        <div class="flex justify-between items-start">
                            <div class="font-semibold text-sm truncate">${note.title || 'Untitled'}</div>
                            ${folderHTML}
                        </div>
                        <div class="text-xs text-zinc-500 mt-1 line-clamp-2">${(note.content||'').substring(0,65)}</div>
                        <div class="flex items-center gap-x-2 mt-2">${tagsHTML}</div>
                    </div>
                `;

                // Drag start
                div.ondragstart = e => e.dataTransfer.setData('text/plain', note.id);

                div.onclick = () => loadNote(note.id);
                container.appendChild(div);
            });
        }

        function moveNoteToFolder(noteId, folder) {
            const note = notes.find(n => n.id === noteId);
            if (!note) return;

            note.folder = folder;
            note.updated = new Date().toISOString();
            saveData();
            renderNotesList();
            renderFolders();
            if (currentNoteId === noteId) {
                document.getElementById('note-folder').value = folder || '';
            }
        }

        function createNewFolder() {
            const name = prompt('Enter new folder name:');
            if (!name || !name.trim()) return;

            if (!customFolders.includes(name.trim())) {
                customFolders.push(name.trim());
                saveData();
            }
            renderFolders();
        }

        function updateFolderSelect() {
            const select = document.getElementById('note-folder');
            const currentValue = select.value;
            select.innerHTML = '<option value="">No folder</option>';

            getAllFolders().forEach(folder => {
                const opt = document.createElement('option');
                opt.value = folder;
                opt.textContent = folder;
                select.appendChild(opt);
            });

            if (currentValue) select.value = currentValue;
        }

        function loadNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;

            currentNoteId = id;
            document.getElementById('note-title').value = note.title || '';
            document.getElementById('editor').value = note.content || '';
            document.getElementById('note-folder').value = note.folder || '';
            document.getElementById('note-tags').value = (note.tags || []).join(', ');

            renderCurrentTags(note.tags || []);
            renderPreview();
            updateWordCount();
            renderNotesList();
        }

        function updateCurrentNote() {
            if (!currentNoteId) return;
            const note = notes.find(n => n.id === currentNoteId);
            if (!note) return;

            note.title = document.getElementById('note-title').value.trim() || 'Untitled';
            note.folder = document.getElementById('note-folder').value || '';
            const tagsVal = document.getElementById('note-tags').value;
            note.tags = tagsVal ? tagsVal.split(',').map(t => t.trim()).filter(Boolean) : [];
            note.updated = new Date().toISOString();

            saveData();
            renderNotesList();
            renderFolders();
            updateFolderSelect();
            renderCurrentTags(note.tags);
        }

        function renderCurrentTags(tags) {
            const container = document.getElementById('current-tags');
            container.innerHTML = '';
            tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'tag-pill px-2 py-px text-xs cursor-pointer hover:bg-zinc-700';
                span.textContent = tag;
                span.onclick = () => {
                    currentFilter = tag;
                    document.getElementById('search-input').value = tag;
                    renderNotesList();
                };
                container.appendChild(span);
            });
        }

        function setupAutoSaveAndListeners() {
            const editor = document.getElementById('editor');
            editor.addEventListener('input', () => {
                if (!currentNoteId) return;
                const note = notes.find(n => n.id === currentNoteId);
                if (!note) return;

                note.content = editor.value;
                note.updated = new Date().toISOString();

                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    saveData();
                    document.getElementById('save-status').textContent = 'Saved';
                    setTimeout(() => document.getElementById('save-status').textContent = 'Saved locally', 600);
                }, 400);

                renderPreview();
                updateWordCount();
                renderNotesList();
            });

            // Search
            const search = document.getElementById('search-input');
            search.addEventListener('input', e => {
                currentFilter = e.target.value;
                renderNotesList();
            });

            search.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    search.value = '';
                    currentFilter = '';
                    renderNotesList();
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); createNewNote(); }
                if (e.key === '/' && document.activeElement.id !== 'search-input') { e.preventDefault(); search.focus(); }
            });

            // PWA
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
        }

        function createNewNote() {
            const newNote = {
                id: Date.now().toString(36) + Math.random().toString(36).slice(2),
                title: 'New Note',
                content: '# New Note\n\nStart writing...',
                folder: currentFolderFilter || '',
                tags: [],
                updated: new Date().toISOString()
            };
            notes.unshift(newNote);
            saveData();

            currentFilter = '';
            document.getElementById('search-input').value = '';

            renderFolders();
            renderNotesList();
            updateFolderSelect();
            loadNote(newNote.id);

            setTimeout(() => {
                document.getElementById('note-title').focus();
                document.getElementById('note-title').select();
            }, 30);
        }

        function deleteCurrentNote() {
            if (!currentNoteId || !confirm('Delete this note?')) return;
            notes = notes.filter(n => n.id !== currentNoteId);
            saveData();
            currentNoteId = null;
            renderFolders();
            renderNotesList();
            updateFolderSelect();
        }

        function exportNote(format) {
            if (!currentNoteId) return;
            const note = notes.find(n => n.id === currentNoteId);
            let content = note.content;
            let filename = (note.title || 'note').replace(/\s/g, '_');

            if (format === 'txt') {
                content = content.replace(/^#+\s*/gm, '');
                filename += '.txt';
            } else {
                filename += '.md';
            }

            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function exportAllNotes() {
            const data = { exportedAt: new Date().toISOString(), notes };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `notebook-backup-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importNotes() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        const importedNotes = imported.notes || imported;

                        let added = 0;
                        importedNotes.forEach(imp => {
                            if (!notes.find(n => n.id === imp.id)) {
                                notes.push(imp);
                                added++;
                            }
                        });

                        saveData();
                        renderFolders();
                        renderNotesList();
                        updateFolderSelect();
                        alert(`Imported ${added} new note(s).`);
                    } catch (err) {
                        alert('Invalid JSON file.');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function updateWordCount() {
            const words = (document.getElementById('editor').value.trim().match(/\S+/g) || []).length;
            document.getElementById('word-count').textContent = `${words} words`;
        }

        function renderPreview() {
            const el = document.getElementById('preview');
            const val = document.getElementById('editor').value || '';
            el.innerHTML = val.trim() ? marked.parse(val, {breaks:true, gfm:true}) : '';
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.classList.replace('fa-moon','fa-sun');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.classList.replace('fa-sun','fa-moon');
                localStorage.setItem('theme', 'dark');
            }
        }

        function initializeApp() {
            loadData();
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon').classList.replace('fa-moon','fa-sun');
            }

            renderFolders();
            renderNotesList();
            updateFolderSelect();
            setupAutoSaveAndListeners();

            // Initial load
            if (notes.length > 0) {
                const latest = [...notes].sort((a,b)=> new Date(b.updated)-new Date(a.updated))[0];
                loadNote(latest.id);
            }

            setTimeout(() => {
                renderPreview();
                updateWordCount();
            }, 100);

            console.log('%c[Notebook] Final polished version ready (Folders + Drag & Drop + Import)', 'color:#22c55e');
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
